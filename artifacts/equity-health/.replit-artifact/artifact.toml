kind = "web"
previewPath = "/"
title = "Equity Health Insurance Ghana"
version = "1.0.0"
id = "artifacts/equity-health"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21536

[services.development]
run = "pnpm --filter @workspace/equity-health run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/equity-health", "run", "build" ]
publicDir = "artifacts/equity-health/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21536"
BASE_PATH = "/"
